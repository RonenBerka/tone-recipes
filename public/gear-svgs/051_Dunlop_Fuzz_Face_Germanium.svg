  <line x1="288" y1="171.5" x2="288" y2="178.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="160" cy="303" r="5" fill="url(#screwGrad)"/>
  <line x1="156.5" y1="303" x2="163.5" y2="303" stroke="#222" stroke-width="1.2"/>
  <line x1="160" y1="299.5" x2="160" y2="306.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="32" cy="175" r="5" fill="url(#screwGrad)"/>
  <line x1="28.5" y1="175" x2="35.5" y2="175" stroke="#222" stroke-width="1.2"/>
  <line x1="32" y1="171.5" x2="32" y2="178.5" stroke="#222" stroke-width="1.2"/>
  <!-- Knob: VOLUME -->
  <line x1="85.5" y1="153.0" x2="82.9" y2="154.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="85.5" y1="127.0" x2="82.9" y2="125.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="108.0" y1="114.0" x2="108.0" y2="111.0" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="130.5" y1="127.0" x2="133.1" y2="125.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="130.5" y1="153.0" x2="133.1" y2="154.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <circle cx="108" cy="140" r="24" fill="url(#knobRingGrad)" filter="url(#knobShadow)"/>
  <circle cx="108" cy="140" r="24" fill="none" stroke="#888" stroke-width="0.5" opacity="0.4"/>
  <circle cx="108" cy="140" r="18.72" fill="url(#knobGrad)"/>
  <ellipse cx="103.3" cy="134.4" rx="8.4" ry="5.2" fill="white" opacity="0.07"/>
  <line x1="108.0" y1="140.0" x2="93.3" y2="140.0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="108" cy="140" r="3" fill="#3a3a3a"/>
  <text x="108" y="178" fill="white" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.5" filter="url(#textEmboss)" clip-path="url(#bodyClip)">VOLUME</text>
  <!-- Knob: FUZZ -->
  <line x1="189.5" y1="153.0" x2="186.9" y2="154.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="189.5" y1="127.0" x2="186.9" y2="125.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="212.0" y1="114.0" x2="212.0" y2="111.0" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="234.5" y1="127.0" x2="237.1" y2="125.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="234.5" y1="153.0" x2="237.1" y2="154.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <circle cx="212" cy="140" r="24" fill="url(#knobRingGrad)" filter="url(#knobShadow)"/>
  <circle cx="212" cy="140" r="24" fill="none" stroke="#888" stroke-width="0.5" opacity="0.4"/>
  <circle cx="212" cy="140" r="18.72" fill="url(#knobGrad)"/>
  <ellipse cx="207.3" cy="134.4" rx="8.4" ry="5.2" fill="white" opacity="0.07"/>
  <line x1="212.0" y1="140.0" x2="199.3" y2="132.6" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <circle cx="212" cy="140" r="3" fill="#3a3a3a"/>
  <text x="212" y="178" fill="white" font-size="9" text-anchor="middle" font-weight="bold" letter-spacing="0.5" filter="url(#textEmboss)" clip-path="url(#bodyClip)">FUZZ</text>
  <polygon points="160,195 100,300 220,300" fill="#111" opacity="0.9"/>
  <circle cx="160" cy="240" r="26" fill="#1a1a1a"/>
  <circle cx="160" cy="240" r="26" fill="none" stroke="#555" stroke-width="1" opacity="0.5"/>
  <circle cx="160" cy="240" r="22" fill="url(#switchGrad)"/>
  <ellipse cx="156" cy="235" rx="10" ry="6" fill="white" opacity="0.05"/>
  <circle cx="160" cy="240" r="6" fill="#2a2a2a"/>
  <circle cx="158" cy="238" r="2" fill="#555" opacity="0.4"/>
  <text x="160" y="195" fill="white" font-size="10" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="3" opacity="0.85" filter="url(#textEmboss)" clip-path="url(#bodyClip)">DUNLOP</text>
  <text x="160" y="297" fill="white" font-size="9" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="2" opacity="0.9" filter="url(#textEmboss)" clip-path="url(#bodyClip)">FUZZ FACE (GERMANIUM)</text>
  <circle cx="20" cy="145" r="10" fill="url(#jackGrad)"/>
  <circle cx="20" cy="145" r="7" fill="#1a1a1a"/>
  <circle cx="20" cy="145" r="4" fill="#0d0d0d"/>
  <circle cx="18" cy="143" r="1.5" fill="#999" opacity="0.5"/>
  <text x="36" y="149" fill="white" font-size="7" text-anchor="start" opacity="0.8">IN</text>
  <circle cx="300" cy="145" r="10" fill="url(#jackGrad)"/>
  <circle cx="300" cy="145" r="7" fill="#1a1a1a"/>
  <circle cx="300" cy="145" r="4" fill="#0d0d0d"/>
  <circle cx="298" cy="143" r="1.5" fill="#999" opacity="0.5"/>
  <text x="284" y="149" fill="white" font-size="7" text-anchor="end" opacity="0.8">OUT</text>
  <text x="160" y="375" fill="white" font-size="13" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="1" opacity="0.95" filter="url(#textEmboss)" clip-path="url(#bodyClip)">Dunlop Fuzz Face (Germanium)</text>
  <text x="160" y="393" fill="#aaa" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" letter-spacing="1" opacity="0.7" filter="url(#textEmboss)" clip-path="url(#bodyClip)">Fuzz Pedal</text>
