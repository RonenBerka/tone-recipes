  <circle cx="250" cy="185" r="10" fill="url(#jackGrad)"/>
  <circle cx="250" cy="185" r="7" fill="#1a1a1a"/>
  <circle cx="250" cy="185" r="4" fill="#0d0d0d"/>
  <circle cx="248" cy="183" r="1.5" fill="#999" opacity="0.5"/>
