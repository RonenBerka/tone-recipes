  <line x1="66.2" y1="133.0" x2="63.6" y2="131.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="87.0" y1="121.0" x2="87.0" y2="118.0" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="107.8" y1="133.0" x2="110.4" y2="131.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="107.8" y1="157.0" x2="110.4" y2="158.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <circle cx="87" cy="145" r="22" fill="url(#knobRingGrad)" filter="url(#knobShadow)"/>
