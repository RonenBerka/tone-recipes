  <line x1="233" y1="32.5" x2="233" y2="39.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="47" cy="293" r="5" fill="url(#screwGrad)"/>
  <line x1="43.5" y1="293" x2="50.5" y2="293" stroke="#222" stroke-width="1.2"/>
  <line x1="47" y1="289.5" x2="47" y2="296.5" stroke="#222" stroke-width="1.2"/>
