  <rect x="92" y="212" width="96" height="51" rx="5" fill="none" stroke="#666" stroke-width="0.5" opacity="0.4"/>
  <circle cx="30" cy="185" r="10" fill="url(#jackGrad)"/>
  <circle cx="30" cy="185" r="7" fill="#1a1a1a"/>
