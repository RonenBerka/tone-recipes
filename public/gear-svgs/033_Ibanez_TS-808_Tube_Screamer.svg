  <line x1="119.2" y1="133.0" x2="116.6" y2="131.5" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="140.0" y1="121.0" x2="140.0" y2="118.0" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="160.8" y1="133.0" x2="163.4" y2="131.5" stroke="white" stroke-width="1" opacity="0.4"/>
