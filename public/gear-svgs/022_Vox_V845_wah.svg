<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 440" width="240" height="440" font-family="Arial,sans-serif">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#434343"/>
      <stop offset="25%" stop-color="#111111"/>
      <stop offset="75%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="bodyGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#434343"/>
      <stop offset="20%" stop-color="#111111"/>
      <stop offset="80%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="bodyRadGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#434343"/>
      <stop offset="35%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="knobRingGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#999"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="knobGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="60%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="screwGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#333"/>
    </radialGradient>
    <radialGradient id="jackGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <linearGradient id="switchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="grillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a99173"/>
      <stop offset="100%" stop-color="#775f41"/>
    </linearGradient>
    <linearGradient id="speakerGrad" cx="40%" cy="35%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="speakerRadGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="70%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="ledGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bodyShadow" x="-15%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="5" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="knobShadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="textEmboss">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="0" y="0" width="320" height="480"/>
    </clipPath>
  </defs>
  <rect width="240" height="440" fill="url(#bgGrad)"/>
  <polygon points="30,30 210,30 230,360 10,360" fill="url(#bodyGrad)" filter="url(#bodyShadow)"/>
  <polygon points="30,30 210,30 230,360 10,360" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <polygon points="30,30 210,30 215,42 25,42" fill="white" opacity="0.1"/>
  <rect x="25" y="60" width="190" height="260" rx="8" fill="#1a1a1a" opacity="0.85"/>
