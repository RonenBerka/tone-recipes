  <line x1="25" y1="190" x2="215" y2="190" stroke="#555" stroke-width="2" opacity="0.6"/>
  <text x="120" y="155" fill="white" font-size="14" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="1" opacity="0.95" filter="url(#textEmboss)" clip-path="url(#bodyClip)">V845 wah</text>
  <text x="120" y="173" fill="#aaa" font-size="9" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="3" opacity="0.8" filter="url(#textEmboss)" clip-path="url(#bodyClip)">VOX</text>
  <circle cx="10" cy="80" r="10" fill="url(#jackGrad)"/>
  <circle cx="10" cy="80" r="7" fill="#1a1a1a"/>
  <circle cx="10" cy="80" r="4" fill="#0d0d0d"/>
  <circle cx="8" cy="78" r="1.5" fill="#999" opacity="0.5"/>
  <text x="26" y="84" fill="white" font-size="7" text-anchor="start" opacity="0.8">IN</text>
  <circle cx="230" cy="80" r="10" fill="url(#jackGrad)"/>
  <circle cx="230" cy="80" r="7" fill="#1a1a1a"/>
  <circle cx="230" cy="80" r="4" fill="#0d0d0d"/>
  <circle cx="228" cy="78" r="1.5" fill="#999" opacity="0.5"/>
  <text x="214" y="84" fill="white" font-size="7" text-anchor="end" opacity="0.8">OUT</text>
  <circle cx="42" cy="45" r="5" fill="url(#screwGrad)"/>
  <line x1="38.5" y1="45" x2="45.5" y2="45" stroke="#222" stroke-width="1.2"/>
  <line x1="42" y1="41.5" x2="42" y2="48.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="198" cy="45" r="5" fill="url(#screwGrad)"/>
  <line x1="194.5" y1="45" x2="201.5" y2="45" stroke="#222" stroke-width="1.2"/>
  <line x1="198" y1="41.5" x2="198" y2="48.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="35" cy="348" r="5" fill="url(#screwGrad)"/>
  <line x1="31.5" y1="348" x2="38.5" y2="348" stroke="#222" stroke-width="1.2"/>
  <line x1="35" y1="344.5" x2="35" y2="351.5" stroke="#222" stroke-width="1.2"/>
  <circle cx="205" cy="348" r="5" fill="url(#screwGrad)"/>
  <line x1="201.5" y1="348" x2="208.5" y2="348" stroke="#222" stroke-width="1.2"/>
  <line x1="205" y1="344.5" x2="205" y2="351.5" stroke="#222" stroke-width="1.2"/>
  <text x="120" y="400" fill="white" font-size="13" text-anchor="middle" font-weight="bold" font-style="normal" letter-spacing="1" opacity="0.95" filter="url(#textEmboss)" clip-path="url(#bodyClip)">Vox V845 wah</text>
  <text x="120" y="418" fill="#aaa" font-size="9" text-anchor="middle" font-weight="normal" font-style="normal" letter-spacing="1" opacity="0.7" filter="url(#textEmboss)" clip-path="url(#bodyClip)">Wah Pedal</text>
</svg>