<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" font-family="Arial,sans-serif">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c5c6c"/>
      <stop offset="25%" stop-color="#2a2a3a"/>
      <stop offset="75%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#020212"/>
    </linearGradient>
    <linearGradient id="bodyGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c5c6c"/>
      <stop offset="20%" stop-color="#2a2a3a"/>
      <stop offset="80%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#020212"/>
